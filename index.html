<!DOCTYPE html>
<html lang="nl" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#efe9dd" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#26242a" media="(prefers-color-scheme: dark)">
  <meta name="description" content="Live status van de Kattenberg 118-diensten — websites, studio en analytics.">
  <meta name="robots" content="noindex">
  <title>Status — Kattenberg 118</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%233d2d33'/%3E%3Ccircle cx='16' cy='16' r='7' fill='%2393b4a1'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="wrap">
    <header class="site-head">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="9" fill="currentColor"/>
            <circle cx="16" cy="16" r="6.5" fill="var(--brand-cream)"/>
          </svg>
        </span>
        <span class="brand-name">Kattenberg&nbsp;118</span>
      </div>
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Wissel licht/donker thema" title="Wissel thema">
        <svg class="i-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <svg class="i-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      </button>
    </header>

    <section class="overview" id="overview" aria-live="polite">
      <div class="overview-inner" id="overviewInner">
        <span class="ov-dot" id="ovDot"></span>
        <div class="ov-text">
          <h1 class="ov-title" id="ovTitle">Status laden…</h1>
          <p class="ov-sub" id="ovSub">Even geduld terwijl we de diensten controleren.</p>
        </div>
      </div>
    </section>

    <main>
      <ul class="services" id="services" aria-busy="true">
        <li class="service service--skeleton"><span class="sk sk-dot"></span><span class="sk sk-line"></span></li>
        <li class="service service--skeleton"><span class="sk sk-dot"></span><span class="sk sk-line"></span></li>
        <li class="service service--skeleton"><span class="sk sk-dot"></span><span class="sk sk-line"></span></li>
        <li class="service service--skeleton"><span class="sk sk-dot"></span><span class="sk sk-line"></span></li>
      </ul>

      <p class="error-box" id="errorBox" hidden>
        De status-gegevens konden niet geladen worden. We proberen het zo opnieuw.
      </p>
    </main>

    <footer class="site-foot">
      <p class="updated" id="updated">—</p>
      <p class="legend">
        <span class="lg"><span class="dot dot--up"></span>Operationeel</span>
        <span class="lg"><span class="dot dot--degraded"></span>Verstoord</span>
        <span class="lg"><span class="dot dot--down"></span>Storing</span>
      </p>
      <p class="colophon">Onafhankelijk gemeten, elke 5&nbsp;min, buiten onze servers om · <a href="https://www.kattenberg118.be" rel="noopener">kattenberg118.be</a></p>
    </footer>
  </div>

  <script src="assets/app.js" defer></script>
</body>
</html>
